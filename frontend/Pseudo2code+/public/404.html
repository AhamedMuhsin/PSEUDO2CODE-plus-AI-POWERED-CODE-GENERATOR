<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pseudo2Code+</title>
    <script>
      // GitHub Pages project-site SPA fallback.
      // Redirect unknown paths to index with encoded original path.
      (function () {
        var l = window.location;
        var basePath = '/PSEUDO2CODE-plus-AI-POWERED-CODE-GENERATOR';
        var path = l.pathname.indexOf(basePath) === 0
          ? l.pathname.slice(basePath.length)
          : l.pathname;
        var target =
          l.protocol + '//' + l.host +
          basePath + '/?p=' + encodeURIComponent(path + l.search + l.hash);
        l.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
